# 정적 사이트 — 빌드 단계 없음. 루트를 그대로 배포한다.
[build]
  publish = "."
  command = ""

# 서비스워커는 항상 재검증(구버전 SW가 캐시에 박히는 것 방지)
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# 매니페스트 MIME 명시
[[headers]]
  for = "/manifest.webmanifest"
  [headers.values]
    Content-Type = "application/manifest+json"
